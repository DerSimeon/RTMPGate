services:
  valkey:
    image: valkey/valkey:9.0.4-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data

  rtmpgate:
    build:
      context: .
    depends_on:
      - valkey
    environment:
      RTMPGATE_HTTP_PORT: "8080"
      RTMPGATE_RTMP_PORT: "1935"
      RTMPGATE_REDIS_URL: "redis://valkey:6379"
    ports:
      - "8080:8080"
      - "1935:1935"

  upstream-a:
    image: bluenviron/mediamtx:latest
    ports:
      - "1936:1935"
      - "8890:8888"
    environment:
      MTX_RTMP: "yes"
      MTX_RTMPADDRESS: ":1935"
      MTX_HLS: "yes"
      MTX_HLSADDRESS: ":8888"

  upstream-b:
    image: bluenviron/mediamtx:latest
    ports:
      - "1937:1935"
      - "8891:8888"
    environment:
      MTX_RTMP: "yes"
      MTX_RTMPADDRESS: ":1935"
      MTX_HLS: "yes"
      MTX_HLSADDRESS: ":8888"

volumes:
  valkey-data:
