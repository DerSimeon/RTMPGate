name: Lint

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Detekt
        run: ./gradlew detekt --no-daemon

      - name: Ensure version was bumped for main
        if: github.base_ref == 'main'
        shell: bash
        run: |
          set -euo pipefail

          base_file="$(mktemp)"
          git show "origin/${{ github.base_ref }}:build.gradle.kts" > "$base_file"

          base_version="$(sed -n 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' "$base_file" | head -n1)"
          head_version="$(sed -n 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' build.gradle.kts | head -n1)"

          if [[ -z "$base_version" || -z "$head_version" ]]; then
            echo "Could not read project version from build.gradle.kts"
            exit 1
          fi

          if [[ ! "$head_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "Version must look like SemVer. Found: $head_version"
            exit 1
          fi

          if [[ "$base_version" == "$head_version" ]]; then
            echo "PRs into main must bump version."
            echo "Base version: $base_version"
            echo "Head version: $head_version"
            exit 1
          fi

          echo "Version changed: $base_version -> $head_version"
